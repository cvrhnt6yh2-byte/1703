<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  min-height:100dvh;background:#000;color:#fff;
  font-family:'Inter',-apple-system,sans-serif;
  display:flex;flex-direction:column;justify-content:center;
  padding:32px 24px calc(32px + env(safe-area-inset-bottom,0px));
  max-width:560px;margin:0 auto;
}
h1{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:6px;color:#6e6e73;margin-bottom:36px;text-align:center}
a.card{
  display:block;text-decoration:none;color:#fff;
  background:#0e0e0e;border-radius:24px;
  padding:28px 26px;margin-bottom:16px;
  transition:transform .12s, background .12s;
}
a.card:active{transform:scale(.97);background:#161616}
.mark{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;letter-spacing:3px}
.mark .accent{color:#ff453a}
.desc{color:#6e6e73;font-size:15px;margin-top:8px;font-weight:500}
.arrow{float:right;color:#3a3a3c;font-size:26px;margin-top:10px}
footer{text-align:center;margin-top:34px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;color:#3a3a3c}
</style>
</head>
<body>
  <h1>ВЫБЕРИ ПРИЛОЖЕНИЕ</h1>

  <a class="card" href="workout.html">
    <span class="arrow">›</span>
    <div class="mark">17<span class="accent">03</span></div>
    <div class="desc">Тренировки · программа, веса, прогресс</div>
  </a>

  <a class="card" href="1q84.html">
    <span class="arrow">›</span>
    <div class="mark">1Q<span class="accent">84</span></div>
    <div class="desc">Привычки · рутина, календарь, статистика</div>
  </a>

  <footer>BY NIKOLAI</footer>
</body>
</html>
